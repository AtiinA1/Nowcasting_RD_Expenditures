program: MLP_AGT_temporalsplit_wandb.py
method: grid
metric:
  name: final_ensemble_val_rmse
  goal: minimize
parameters:
  learning_rate:
    value: 0.01                    # Start high
  batch_size:
    value: 8                       # Small batch
  hidden1_dim:
    value: 20                      # Single simple layer
  hidden2_dim:
    value: 0                       # Disable second layer
  hidden3_dim:
    value: 0                       # Disable third layer
  embedding_dim:
    value: 4                       # Small embedding
  size_ensemble:
    value: 1                       # Single model for speed
  num_epochs:
    value: 4000                    # INSANE training time!
  patience:
    value: 1600                    # MASSIVE patience (40% of epochs)
  lr_milestone:
    value: 1200                    # ULTRA late decay
  lr_gamma:
    value: 0.1
  optimizer:
    value: "adamw"
  weight_decay:
    value: 0.0001                  # Light regularization
  dropout_rate:
    value: 0.1                     # Light dropout 