program: MLP_AGT_temporalsplit_wandb.py
method: bayes
metric:
  name: final_ensemble_val_rmse
  goal: minimize
early_terminate:
  type: hyperband
  min_iter: 1000                   # Let it run for at least 1000 epochs
parameters:
  learning_rate:
    values: [0.005, 0.01, 0.02]    # High starting rates
  batch_size:
    values: [4, 8, 16]             # Very small batches
  
  # Test 1-layer, 2-layer, and simple 3-layer architectures
  hidden1_dim:
    values: [16, 20, 24, 32]       # Simple first layer
  hidden2_dim:
    values: [0, 8, 12, 16]         # 0 = single layer, others = 2-layer
  hidden3_dim:
    values: [0, 4, 6, 8]           # 0 = 1-2 layers, others = 3-layer
  
  embedding_dim:
    values: [2, 4, 6]              # Small embeddings
  size_ensemble:
    values: [1, 3]                 # Single model or small ensemble
  num_epochs:
    values: [2000, 3000, 4000]     # EXTREME training time!
  patience:
    values: [800, 1200, 1600]      # MASSIVE patience (40% of epochs)
  lr_milestone:
    values: [600, 1000, 1400]      # ULTRA late milestones
  lr_gamma:
    values: [0.1, 0.2]             # Different decay rates
  optimizer:
    value: "adamw"
  weight_decay:
    values: [0.00001, 0.0001, 0.001] # Range of regularization
  dropout_rate:
    values: [0.0, 0.1, 0.2]        # Range of dropout 