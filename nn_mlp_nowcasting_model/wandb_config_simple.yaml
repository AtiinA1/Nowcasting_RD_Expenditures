program: MLP_AGT_temporalsplit_wandb.py
method: bayes
metric:
  name: final_ensemble_val_rmse
  goal: minimize
early_terminate:
  type: hyperband
  min_iter: 5
parameters:
  learning_rate:
    values: [0.01, 0.001, 0.0001]
  batch_size:
    values: [16, 32, 64]
  hidden1_dim:
    values: [32, 64, 128]
  hidden2_dim:
    values: [16, 32, 64]
  hidden3_dim:
    values: [8, 16, 32]
  embedding_dim:
    values: [4, 8, 16]
  size_ensemble:
    values: [3, 5]
  num_epochs:
    value: 50
  patience:
    value: 10
  lr_milestone:
    value: 25
  lr_gamma:
    value: 0.1
  optimizer:
    values: ["adam", "adamw"] 