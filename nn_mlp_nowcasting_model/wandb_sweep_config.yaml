program: MLP_AGT_temporalsplit_wandb.py
method: bayes  # or random, grid
metric:
  name: final_ensemble_val_rmse
  goal: minimize

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.1
  
  batch_size:
    values: [16, 32, 64, 128, 256]
  
  num_epochs:
    values: [100, 500, 1000, 2000, 5000]
  
  hidden1_dim:
    values: [50, 100, 200, 300, 400, 500]
  
  hidden2_dim:
    values: [10, 20, 50, 100, 200]
  
  hidden3_dim:
    values: [5, 10, 20, 50, 100]
  
  embedding_dim:
    values: [2, 4, 8, 16, 32]
  
  size_ensemble:
    values: [3, 5, 10, 15]
  
  patience:
    values: [500, 1000, 2000, 5000, 10000]
  
  optimizer:
    values: ["adam", "adamw", "sgd"]
  
  lr_milestone:
    values: [10, 20, 50, 100]
  
  lr_gamma:
    distribution: uniform
    min: 0.1
    max: 0.9

early_terminate:
  type: hyperband
  min_iter: 10 